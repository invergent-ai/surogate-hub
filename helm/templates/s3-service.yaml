apiVersion: v1
kind: Service
metadata:
  name: {{ include "shub.fullname" . }}-s3
  labels:
    {{- include "shub.labels" . | nindent 4 }}
  {{- with .Values.s3Service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.s3Service.port }}
      targetPort: http
  selector:
    {{- include "shub.selectorLabels" . | nindent 4 }}
