{{- $secretName := printf "%s-creds" (include "shub.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $accessKey := "" -}}
{{- $secretKey := "" -}}
{{- if $existing -}}
{{- $accessKey = index $existing.data "access-key" | b64dec -}}
{{- $secretKey = index $existing.data "secret-key" | b64dec -}}
{{- else -}}
{{- $accessKey = printf "AKIA%s" (randAlphaNum 16 | upper) -}}
{{- $secretKey = randAlphaNum 40 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "shub.labels" . | nindent 4 }}
type: Opaque
stringData:
  access-key: {{ $accessKey | quote }}
  secret-key: {{ $secretKey | quote }}
