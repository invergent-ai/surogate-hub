syntax = "proto3";
option go_package = "github.com/invergent-ai/surogate-hub/pkg/kv/kvtest";

import "google/protobuf/timestamp.proto";

package ai.invergent.shub.kvtest;

message TestModel {
    bytes name = 1;
    string just_a_string = 2;
    double a_double = 3;
    google.protobuf.Timestamp test_time = 4;
    map<string, int32> test_map = 5;
    repeated bool test_list = 6;
}
